name: Coverage Report

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  coverage:
    name: Run Tests & Post Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Post coverage comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const THRESHOLDS = {
              lines: 90,
              statements: 90,
              functions: 90,
              branches: 80,
            };

            let summary;
            try {
              summary = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            } catch (e) {
              console.log('No coverage summary found');
              return;
            }

            const total = summary.total;

            function getStatusEmoji(pct, threshold) {
              if (pct >= threshold) return '🔵';
              if (pct >= threshold * 0.95) return '🟡';
              return '🔴';
            }

            function formatRow(label, key, threshold) {
              const covered = total[key].covered;
              const total_count = total[key].total;
              const pct = total[key].pct;
              const status = getStatusEmoji(pct, threshold);
              return `| ${status} | **${label}** | ${pct}% (🎯 ${threshold}%) | 🟰 ±0% | ${covered} / ${total_count} |`;
            }

            const body = [
              '## Coverage Report',
              '',
              '| Status | Category | Percentage | Change | Covered / Total |',
              '|--------|----------|------------|--------|-----------------|',
              formatRow('Lines', 'lines', THRESHOLDS.lines),
              formatRow('Statements', 'statements', THRESHOLDS.statements),
              formatRow('Functions', 'functions', THRESHOLDS.functions),
              formatRow('Branches', 'branches', THRESHOLDS.branches),
              '',
              `> Generated on commit \`${{ github.sha }}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('## Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
