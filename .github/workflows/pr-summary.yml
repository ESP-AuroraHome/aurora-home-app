name: PR Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  summarize:
    name: Generate PR Summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and post summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');

            const base = context.payload.pull_request.base.sha;
            const head = context.payload.pull_request.head.sha;

            // Files changed
            const diffOutput = execSync(
              `git diff --name-status ${base}...${head}`
            ).toString().trim();

            const lines = diffOutput ? diffOutput.split('\n') : [];

            const added = [];
            const modified = [];
            const deleted = [];
            const renamed = [];

            for (const line of lines) {
              const [status, ...rest] = line.split('\t');
              if (status === 'A') added.push(rest[0]);
              else if (status === 'M') modified.push(rest[0]);
              else if (status === 'D') deleted.push(rest[0]);
              else if (status.startsWith('R')) renamed.push(`${rest[0]} → ${rest[1]}`);
            }

            // Commits
            const logOutput = execSync(
              `git log --pretty=format:"- %s" ${base}...${head}`
            ).toString().trim();

            const commits = logOutput ? logOutput.split('\n') : [];

            // Stats
            const statsOutput = execSync(
              `git diff --shortstat ${base}...${head}`
            ).toString().trim();

            function section(title, items) {
              if (!items.length) return '';
              return `\n**${title}** (${items.length})\n${items.map(f => `- \`${f}\``).join('\n')}`;
            }

            const body = [
              '## PR Summary',
              '',
              `### Commits (${commits.length})`,
              ...commits,
              '',
              '### Files changed',
              section('Added', added),
              section('Modified', modified),
              section('Deleted', deleted),
              section('Renamed', renamed),
              '',
              `> ${statsOutput}`,
            ].filter(l => l !== undefined).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('## PR Summary')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
